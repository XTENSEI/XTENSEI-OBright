# Place this file at:
# - /vendor/etc/xtensei-obright.conf (primary)
# - /system/etc/xtensei-obright.conf (secondary)
# - /data/local/tmp/xtensei-obright.conf (testing)
#
# Lines starting with # are comments

# =============================================================================
# Brightness Curve Selection
# =============================================================================
# Choose the brightness curve that best suits your display:
#
# cube_root     - Default, perceptual linearity (recommended for most devices)
# linear        - Direct 1:1 mapping
# gamma_22      - Gamma 2.2 correction (good for AMOLED)
# gamma_24      - Gamma 2.4 correction (good for dark rooms)
# logarithmic   - Log curve for very dark environments
# exponential   - Exponential for bright environments
# s_curve       - S-curve for balanced response
# custom        - User-defined curve (requires modification)
#
curve = cube_root

# =============================================================================
# Logging Configuration
# =============================================================================
# Log level (0=ERROR, 1=WARN, 2=INFO, 3=DEBUG, 4=VERBOSE)
# Use higher levels for troubleshooting
#
log_level = 2

# =============================================================================
# Battery Saver Integration
# =============================================================================
# Scale factor when battery saver is active (0.0 - 1.0)
# 0.7 = 70% of normal brightness in battery saver mode
#
battery_saver_scale = 0.7

# =============================================================================
# Thermal Throttling
# =============================================================================
# Scale factor when thermal throttling is active (0.0 - 1.0)
# 0.8 = 80% of normal brightness when device is hot
#
thermal_scale = 0.8

# =============================================================================
# Screen Wake Delay
# =============================================================================
# Delay in milliseconds after screen wake before applying brightness
# Helps with panels that need initialization time
#
wake_delay_ms = 100

# =============================================================================
# Device-Specific Presets
# =============================================================================
# Uncomment one of these presets for your device type:
#
# TECNO Spark series (IPS displays)
# curve = cube_root
# battery_saver_scale = 0.7
#
# TECNO Camon series (AMOLED displays)
# curve = gamma_22
# battery_saver_scale = 0.6
#
# TECNO Phantom series (AMOLED displays)
# curve = gamma_22
# battery_saver_scale = 0.6
#
# Infinix Note series (IPS displays)
# curve = cube_root
# battery_saver_scale = 0.7
#
# Infinix Zero series (AMOLED displays)
# curve = gamma_24
# battery_saver_scale = 0.6
#
# Infinix GT series (Gaming optimized)
# curve = s_curve
# battery_saver_scale = 0.75
#
# iTel budget devices (IPS displays)
# curve = linear
# battery_saver_scale = 0.8

# =============================================================================
# Advanced Options (Do not modify unless you know what you're doing)
# =============================================================================
# Minimum brightness threshold (0-8191)
# min_threshold = 222

# Maximum brightness value (0-8191)
# max_value = 8191

# Enable debug mode (writes extra log entries)
# debug_mode = false

# Force specific max brightness (0 = auto-detect)
# force_max_brightness = 0

# Force specific min brightness (0 = auto-detect)
# force_min_brightness = 0
